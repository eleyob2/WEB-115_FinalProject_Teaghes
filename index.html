<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payroll Login System</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Payroll Login System</h1>

      <section id="csv-loader" class="hidden">
        <h2>Load Employee CSV</h2>
        <p>Select a CSV file with the following columns: <code>name,password,rate</code>.</p>
        <input id="employee-file" type="file" accept=".csv" />
      </section>

      <section id="login-section" class="hidden">
        <h2>Login</h2>
        <form id="login-form">
          <label>
            Username
            <input id="username" type="text" required />
          </label>
          <label>
            Password
            <input id="password" type="password" required />
          </label>
          <button type="submit">Login</button>
        </form>
      </section>

      <section id="actions" class="hidden">
        <div id="greeting"></div>

        <h2>Payroll Calculator</h2>
        <form id="payroll-form">
          <label>
            Hours worked
            <input id="hours" type="number" min="0" step="0.1" value="0" required />
          </label>
          <label>
            Overtime hours
            <input id="overtime" type="number" min="0" step="0.1" value="0" required />
          </label>
          <button type="submit">Calculate Payroll</button>
        </form>

        <div class="buttons">
          <button id="print-pay" type="button">Print Pay</button>
          <button id="event" type="button">Show Greeting</button>
          <button id="logout" type="button">Logout</button>
        </div>

        <div id="pay-result" class="result"></div>
      </section>

      <div id="message" class="message"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
